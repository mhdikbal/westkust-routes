version: "3.9"

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: voc_db
    restart: always
    environment:
      POSTGRES_DB: vocdb
      POSTGRES_USER: vocuser
      POSTGRES_PASSWORD: vocpassword
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vocuser -d vocdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voc_backend
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://vocuser:vocpassword@db:5432/vocdb
      DATABASE_SYNC_URL: postgresql://vocuser:vocpassword@db:5432/vocdb
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: >
      sh -c "python seed_data.py && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: voc_frontend
    restart: always
    environment:
      DJANGO_SECRET_KEY: "voc-westkust-django-secret-key-2024"
      DEBUG: "True"
      API_BASE_URL: "http://backend:8000"
    depends_on:
      - backend
    ports:
      - "8001:8001"
    command: python manage.py runserver 0.0.0.0:8001

  nginx:
    image: nginx:1.25-alpine
    container_name: voc_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
